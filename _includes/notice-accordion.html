<!-- _includes/notice-accordion.html -->
<details class="notice-board notice-board--accordion">
  <summary>공지사항</summary>
  {% if site.data.notices and site.data.notices.size > 0 %}
  <ul class="notice-list">
    {% for notice in site.data.notices %}
    <li>
      <span class="notice-date">{{ notice.date }}</span>
      <span class="notice-title">{{ notice.title }}</span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">등록된 공지사항이 없습니다.</p>
  {% endif %}
</details>
